<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Grid Dashboard (CW PV)</title>
<style>
  :root {
    --bg: #131313; --panel: #1e1e1e; --card: #181818;
    --border: #2c2c2c; --border-bright: #3a3a3a;
    --ink: #e6e6e6; --dim: #888; --dimmer: #555;
    --ok: #6fb86f; --warn: #d9a85a; --err: #d96a6a;
    --bus: #5a8ec9; --pv: #6fb86f; --pwr-in: #d9a85a; --pwr-out: #b67ad9;
    --red: #e07070; --yel: #d9c95a; --grn: #6fb86f;
    --sun: #f5c84b;
    --cap: #5ec9c0;
  }
  * { box-sizing: border-box; }
  body { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
         background: var(--bg); color: var(--ink); margin: 0; padding: 16px; }
  h1 { margin: 0 0 4px 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .sub { color: var(--dim); font-size: 12px; margin-bottom: 16px; }

  .hosts { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
           margin-bottom: 16px; padding: 10px 12px;
           background: var(--panel); border: 1px solid var(--border); }
  .hosts label { font-size: 10px; color: var(--dim); display: block;
                 text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .hosts input { background: #0d0d0d; color: var(--ink); border: 1px solid var(--border);
                 padding: 5px 7px; font-family: inherit; font-size: 12px; width: 160px; }

  .top-center-actions { text-align: center; margin: -4px 0 12px 0; }

  .gauge { background: var(--panel); border: 1px solid var(--border);
           padding: 14px 16px; margin-bottom: 16px; }
  .gauge-top { display: flex; justify-content: space-between; align-items: baseline;
               margin-bottom: 8px; }
  .gauge-v { font-size: 13px; color: var(--dim); }
  .gauge-v b { color: var(--ink); font-size: 26px; margin-right: 6px;
               font-variant-numeric: tabular-nums; }
  .gauge-state { font-size: 12px; color: var(--dim); }
  .gauge-bar { position: relative; height: 28px; background: #0d0d0d;
               border: 1px solid var(--border); }
  .gauge-deadband { position: absolute; top: 0; bottom: 0;
                    background: rgba(90,142,201,0.15);
                    border-left: 1px dashed var(--bus);
                    border-right: 1px dashed var(--bus); }
  .gauge-marker { position: absolute; top: -3px; bottom: -3px; width: 3px;
                  background: var(--ok); transition: left 0.4s ease-out; }
  .gauge-scale { display: flex; justify-content: space-between;
                 font-size: 10px; color: var(--dim); margin-top: 4px; }

  /* Time-series chart */
  .chart-wrap { background: var(--panel); border: 1px solid var(--border);
                padding: 12px 14px; margin-bottom: 16px; }
  .chart-head { display: flex; justify-content: space-between; align-items: center;
                margin-bottom: 8px; }
  .chart-title { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
  .chart-legend { display: flex; gap: 12px; font-size: 11px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; cursor: pointer;
         user-select: none; color: var(--dim); }
  .leg.on { color: var(--ink); }
  .leg .sw { width: 14px; height: 3px; }
  .chart-canvas { display: block; width: 100%; height: 220px; background: #0d0d0d;
                  border: 1px solid var(--border); }
  .chart-foot { display: flex; justify-content: space-between;
                font-size: 10px; color: var(--dim); margin-top: 4px; }

  /* Per-module mini-chart */
  .mod-chart { display: block; width: 100%; height: 110px;
               background: #0d0d0d; border: 1px solid var(--border);
               margin: 4px 0 10px 0; }
  .mod-chart-foot { display: flex; gap: 10px; font-size: 10px; color: var(--dim);
                    margin-top: -6px; margin-bottom: 8px; flex-wrap: wrap; }
  .mod-chart-foot .leg { gap: 4px; }

  .grid { display: grid; gap: 14px;
          grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
  .module { background: var(--panel); border: 1px solid var(--border); padding: 14px; }
  .module.offline { opacity: 0.55; }
  .module.tripped { border-color: var(--err); }
  .module > h2 { margin: 0 0 12px 0; font-size: 13px; font-weight: 600;
                 letter-spacing: 0.3px; display: flex; justify-content: space-between;
                 align-items: center; gap: 6px; }
  .mod-host { margin: -8px 0 10px 0; font-size: 10px; color: var(--dim);
              letter-spacing: 0.3px; word-break: break-all; }
  .pill { font-size: 10px; padding: 2px 8px; border-radius: 10px;
          background: #2a2a2a; color: var(--dim); font-weight: normal;
          text-transform: uppercase; letter-spacing: 0.5px; }
  .pill.ok   { background: rgba(111,184,111,0.18); color: var(--ok); }
  .pill.warn { background: rgba(217,168,90,0.18); color: var(--warn); }
  .pill.err  { background: rgba(217,106,106,0.18); color: var(--err); }
  .pill.sun  { background: rgba(245,200,75,0.18); color: var(--sun); }

  /* Stat-card grid (PV, Grid, Export modules) */
  .stats { display: grid; grid-template-columns: repeat(2, 1fr);
           gap: 6px; margin-bottom: 12px; }
  .stat { background: var(--card); border: 1px solid var(--border);
          border-top: 2px solid var(--dimmer);
          padding: 8px 10px; min-height: 56px; }
  .stat[data-tag="bus"]     { border-top-color: var(--bus); }
  .stat[data-tag="pv"]      { border-top-color: var(--pv); }
  .stat[data-tag="pwr-in"]  { border-top-color: var(--pwr-in); }
  .stat[data-tag="pwr-out"] { border-top-color: var(--pwr-out); }
  .stat[data-tag="sun"]     { border-top-color: var(--sun); }
  .stat[data-tag="cap"]     { border-top-color: var(--cap); }

  /* Supercap SoC bar — sits inside its stat card */
  .soc-track { position: relative; height: 8px; background: #0d0d0d;
               border: 1px solid var(--border); margin-top: 6px; }
  .soc-fill  { position: absolute; left: 0; top: 0; bottom: 0;
               background: var(--cap); transition: width 0.4s ease-out; }
  .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase;
                letter-spacing: 0.5px; }
  .stat-value { font-size: 18px; color: var(--ink);
                font-variant-numeric: tabular-nums; margin-top: 4px;
                white-space: nowrap; }
  .stat-unit  { font-size: 11px; color: var(--dim); margin-left: 3px; }
  .stat-sub   { font-size: 10px; color: var(--dim); margin-top: 2px; }
  .stat-value.dim { color: var(--dimmer); }

  /* LED color rows */
  .led-total { background: var(--card); border: 1px solid var(--border);
               border-top: 2px solid var(--pwr-in);
               padding: 8px 10px; margin-bottom: 8px; }
  .led-row { display: grid; grid-template-columns: 44px repeat(3, 1fr);
             gap: 10px; padding: 8px 10px; background: var(--card);
             border: 1px solid var(--border); margin-bottom: 4px;
             align-items: center; }
  .led-color { font-weight: 700; font-size: 13px; text-transform: uppercase;
               letter-spacing: 0.5px; }
  .led-color.red { color: var(--red); }
  .led-color.yel { color: var(--yel); }
  .led-color.grn { color: var(--grn); }
  .led-metric { display: flex; align-items: baseline; gap: 4px;
                font-variant-numeric: tabular-nums; }
  .led-metric-label { font-size: 10px; color: var(--dim);
                      text-transform: uppercase; letter-spacing: 0.5px; }
  .led-metric-value { font-size: 14px; color: var(--ink); }
  .led-metric-unit  { font-size: 10px; color: var(--dim); }

  .controls { display: flex; flex-direction: column; gap: 6px; margin-top: 10px;
              padding-top: 10px; border-top: 1px solid var(--border); }
  .row { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .row label { flex: 0 0 110px; color: var(--dim);
               text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  .row input[type=number] { width: 72px; background: #0d0d0d; color: var(--ink);
                            border: 1px solid var(--border); padding: 4px 6px;
                            font-family: inherit; font-size: 12px; }
  .row input[type=range] { flex: 1; }
  .row .now { flex: 0 0 64px; text-align: right; color: var(--bus);
              font-variant-numeric: tabular-nums; font-size: 12px; }
  button { background: #262626; color: var(--ink); border: 1px solid var(--border-bright);
           padding: 5px 12px; cursor: pointer; font-family: inherit; font-size: 11px;
           letter-spacing: 0.3px; }
  button:hover { background: #303030; }
  button.danger { border-color: var(--err); color: var(--err); }
  button.warn   { border-color: var(--warn); color: var(--warn); }
  button.warn:hover { background: rgba(217,168,90,0.10); }
  button.active { background: rgba(111,184,111,0.18); border-color: var(--ok); color: var(--ok); }
  .seg { display: flex; gap: 4px; flex: 1; }
  .seg button { flex: 1; }
  .quickbar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  /* Trip banner — big visual indicator inside a module when latched */
  .trip-banner { display: none; background: rgba(217,106,106,0.12);
                 border: 1px solid var(--err); color: var(--err);
                 padding: 8px 10px; margin: -4px 0 10px 0; font-size: 12px;
                 letter-spacing: 0.5px; animation: tripblink 1.5s ease-in-out infinite; }
  .trip-banner.show { display: block; }
  .trip-banner b { font-weight: 700; }
  @keyframes tripblink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
</style>
</head>
<body>

<h1>SMART GRID — CW PV variant</h1>
<div class="sub">Polls every 1 s. PV module supports web-MPPT (fetches /sun from icelec50015 server).</div>

<div class="top-center-actions">
  <button id="algorithm-control-toggle" onclick="toggleAlgorithmControlFields()">Algorithm Control</button>
  <div id="algorithm-control-fields" style="display:none; margin-top:6px; padding:8px; background:var(--card); border:1px solid var(--border); text-align:left; max-width:760px; margin-left:auto; margin-right:auto;">
    <div class="row">
      <label>Global Control</label>
      <div class="quickbar" style="margin-top:0">
        <button id="algorithm-enable" onclick="sendAlgorithmControl(true)">Enable Algorithms</button>
        <button id="algorithm-disable" class="danger" onclick="sendAlgorithmControl(false)">Disable Algorithms</button>
      </div>
    </div>
  </div>
</div>

<div class="hosts">
  <span><label>PV (cw)</label><input id="host-pv"     value="pv.local"></span>
  <span><label>Grid</label><input id="host-grid"   value="grid.local"></span>
  <span><label>Export</label><input id="host-export" value="export.local"></span>
  <span><label>Cap</label><input id="host-cap"    value="cap.local"></span>
  <span><label>Lux</label><input id="host-lux"    value="lux.local"></span>
  <span><label>LED</label><input id="host-led"    value="led.local"></span>
  <button onclick="saveHosts()" style="margin-left:auto">Save</button>
</div>

<div class="gauge">
  <div class="gauge-top">
    <div class="gauge-v"><b id="bus-v">--.--</b>V bus</div>
    <div class="gauge-state" id="bus-state">—</div>
  </div>
  <div class="gauge-bar">
    <div class="gauge-deadband" id="gauge-deadband"></div>
    <div class="gauge-marker" id="gauge-marker"></div>
  </div>
  <div class="gauge-scale">
    <span>8.0</span><span>9.0</span><span>9.5</span><span>10.0</span><span>10.5</span><span>11.0</span><span>12.0</span>
  </div>
</div>

<div class="chart-wrap">
  <div class="chart-head">
    <div class="chart-title">Last 60 s</div>
    <div class="chart-legend" id="legend"></div>
  </div>
  <canvas id="chart" class="chart-canvas"></canvas>
  <div class="chart-foot">
    <span>left axis: V (8–12) &nbsp; right axis: A (−2 to +3)</span>
    <span id="chart-now">—</span>
  </div>
</div>

<div class="grid" id="modules"></div>

<script>
const MODULES = ['pv', 'grid', 'export', 'cap', 'lux', 'led'];
const GAUGE_LO = 8.0, GAUGE_HI = 12.0;
const GRID_TARGET_DEFAULT = 9.5, EXPORT_TARGET_DEFAULT = 10.5;
const ALGORITHM_CONTROL_MODULES = ['pv', 'grid', 'export', 'cap', 'led'];

let lastBusVoltage = null;

// ---------- Chart history ----------
const HIST_MAX = 60;
const CHART_V_LO = 8.0,  CHART_V_HI = 12.0;
const CHART_I_LO = -2.0, CHART_I_HI = 3.0;
const TRACES = [
  { key: 'vbus',     label: 'Vbus',     axis: 'V', color: '#e6e6e6' },
  { key: 'i_pv',     label: 'PV iL',    axis: 'A', color: '#6fb86f' },
  { key: 'i_grid',   label: 'Grid iL',  axis: 'A', color: '#5a8ec9' },
  { key: 'i_export', label: 'Export iL',axis: 'A', color: '#b67ad9' },
  { key: 'i_cap',    label: 'Cap iL',   axis: 'A', color: '#5ec9c0' },
  { key: 'i_led',    label: 'LED iL Σ', axis: 'A', color: '#d9a85a' },
];
const HISTORY = { t: [] };
TRACES.forEach(tr => HISTORY[tr.key] = []);
const TRACE_VISIBLE = Object.fromEntries(TRACES.map(t => [t.key, true]));

const MOD_HISTORY = { pv: [], grid: [], export: [], cap: [], lux: [], led: [] };

const PER_MODULE_TRACES = {
  pv: [
    { key: 'v_panel',    label: 'Vpv',  axis: 'V', color: '#6fb86f' },
    { key: 'vb_bus',     label: 'Vbus', axis: 'V', color: '#e6e6e6' },
    { key: 'iL',         label: 'iL',   axis: 'A', color: '#5a8ec9' },
    { key: 'vmpp_target',label: 'Vmpp', axis: 'V', color: '#f5c84b' },
  ],
  grid: [
    { key: 'vb_bus', label: 'Vbus', axis: 'V', color: '#e6e6e6' },
    { key: 'v_psu',  label: 'Vpsu', axis: 'V', color: '#d9a85a' },
    { key: 'iL',     label: 'iL',   axis: 'A', color: '#5a8ec9' },
  ],
  export: [
    { key: 'vb_bus',     label: 'Vbus', axis: 'V', color: '#e6e6e6' },
    { key: 'v_resistor', label: 'Vres', axis: 'V', color: '#6fb86f' },
    { key: 'iL',         label: 'iL',   axis: 'A', color: '#b67ad9' },
  ],
  cap: [
    { key: 'v_cap',  label: 'Vcap', axis: 'V', color: '#5ec9c0' },
    { key: 'vb_bus', label: 'Vbus', axis: 'V', color: '#e6e6e6' },
    { key: 'iL',     label: 'iL',   axis: 'A', color: '#5ec9c0' },
  ],
  lux: [
    { key: 'v_ldr', label: 'V_ldr', axis: 'V', color: '#f5c84b' },
  ],
  led: [
    { key: 'i_red', label: 'R', axis: 'AL', color: '#e07070' },
    { key: 'i_yel', label: 'Y', axis: 'AL', color: '#d9c95a' },
    { key: 'i_grn', label: 'G', axis: 'AL', color: '#6fb86f' },
  ],
};

function recordSample(results) {
  const t = Date.now();
  HISTORY.t.push(t);
  HISTORY.vbus.push(lastBusVoltage);
  HISTORY.i_pv.push(results.pv && results.pv.iL !== undefined ? results.pv.iL : null);
  HISTORY.i_grid.push(results.grid && results.grid.iL !== undefined ? results.grid.iL : null);
  HISTORY.i_export.push(results.export && results.export.iL !== undefined ? results.export.iL : null);
  HISTORY.i_cap.push(results.cap && results.cap.iL !== undefined ? results.cap.iL : null);
  const led = results.led;
  HISTORY.i_led.push(led ?
    ((led.i_red || 0) + (led.i_yel || 0) + (led.i_grn || 0)) : null);
  while (HISTORY.t.length > HIST_MAX) {
    HISTORY.t.shift();
    TRACES.forEach(tr => HISTORY[tr.key].shift());
  }
  MODULES.forEach(name => {
    MOD_HISTORY[name].push({ t, ...(results[name] || {}) });
    while (MOD_HISTORY[name].length > HIST_MAX) MOD_HISTORY[name].shift();
  });
}

function getHost(name) {
  const saved = localStorage.getItem('host-cw-' + name);
  return saved || document.getElementById('host-' + name).value;
}
function saveHosts() {
  MODULES.forEach(n => {
    const v = document.getElementById('host-' + n).value.trim();
    localStorage.setItem('host-cw-' + n, v);
  });
  flashSave();
}
function flashSave() {
  const btn = document.querySelector('.hosts button');
  const orig = btn.textContent;
  btn.textContent = 'Saved ✓'; btn.style.color = 'var(--ok)';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 800);
}
function loadHosts() {
  MODULES.forEach(n => {
    const v = localStorage.getItem('host-cw-' + n);
    if (v) document.getElementById('host-' + n).value = v;
  });
}

function toggleAlgorithmControlFields() {
  const box = document.getElementById('algorithm-control-fields');
  const btn = document.getElementById('algorithm-control-toggle');
  if (!box || !btn) return;
  const open = (box.style.display === 'none' || box.style.display === '');
  box.style.display = open ? 'block' : 'none';
  btn.textContent = open ? 'Hide Algorithm Control' : 'Algorithm Control';
}

async function sendAlgorithmControl(enable) {
  const payload = { enable: enable ? 1 : 0 };
  const results = await Promise.all(ALGORITHM_CONTROL_MODULES.map(name => send(name, payload)));
  const ok = results.every(Boolean);

  const btn = document.getElementById(enable ? 'algorithm-enable' : 'algorithm-disable');
  if (!btn) return;
  const old = btn.textContent;
  btn.textContent = ok ? 'Sent ✓' : 'Failed';
  setTimeout(() => { btn.textContent = old; }, 900);
}

const AUTO_DISCOVERY = {
  running: false,
  lastStartMs: 0,
  cooldownMs: 30000,
  timeoutMs: 450,
  maxConcurrent: 24,
};

function getAutoHost(name) {
  return localStorage.getItem('host-auto-' + name) || '';
}

function setAutoHost(name, host) {
  if (!host) return;
  localStorage.setItem('host-auto-' + name, host);
}

function parseIPv4(raw) {
  const m = String(raw || '').match(/(\d{1,3}(?:\.\d{1,3}){3})/);
  if (!m) return null;
  const ip = m[1];
  const ok = ip.split('.').every(x => {
    const n = Number(x);
    return Number.isInteger(n) && n >= 0 && n <= 255;
  });
  return ok ? ip : null;
}

function hostFromUrl(urlStr) {
  try {
    return new URL(urlStr).host;
  } catch (_e) {
    return null;
  }
}

function moduleFromTlm(data) {
  if (!data || typeof data !== 'object') return null;
  if (typeof data.role === 'string' && MODULES.includes(data.role)) return data.role;
  if ('i_red' in data || 'i_yel' in data || 'i_grn' in data) return 'led';
  if ('v_ldr' in data || 'calibrated' in data) return 'lux';
  if ('v_cap' in data || 'energy_J' in data || 'soc_pct' in data) return 'cap';
  if ('v_panel' in data || 'vmpp_target' in data) return 'pv';
  if ('v_psu' in data) return 'grid';
  if ('v_resistor' in data || 'p_dissip' in data) return 'export';
  return null;
}

function shouldAutoDiscover(name) {
  const raw = getHost(name).trim();
  if (!raw) return true;
  const hasIp = /\b\d{1,3}(?:\.\d{1,3}){3}\b/.test(raw);
  const hasMdns = raw.toLowerCase().includes('.local');
  return hasMdns || !hasIp;
}

function discoverPrefixes() {
  const prefixes = new Set();
  const seed = [];
  MODULES.forEach(n => {
    seed.push(getHost(n));
    seed.push(getAutoHost(n));
  });
  seed.push(window.location && window.location.hostname ? window.location.hostname : '');
  for (const s of seed) {
    const ip = parseIPv4(s);
    if (!ip) continue;
    const p = ip.split('.').slice(0, 3).join('.');
    prefixes.add(p);
  }
  if (!prefixes.size) {
    prefixes.add('192.168.1');
    prefixes.add('192.168.0');
  }
  return Array.from(prefixes).slice(0, 3);
}

function discoveryCandidates(prefixes) {
  const out = [];
  for (const p of prefixes) {
    for (let i = 2; i <= 254; i++) out.push('http://' + p + '.' + i);
  }
  return out;
}

async function runConcurrent(items, limit, worker) {
  let idx = 0;
  const n = Math.min(limit, items.length);
  const runners = [];
  for (let i = 0; i < n; i++) {
    runners.push((async () => {
      while (idx < items.length) {
        const cur = items[idx++];
        await worker(cur);
      }
    })());
  }
  await Promise.all(runners);
}

async function autoDiscoverMissing(missingNames) {
  const now = Date.now();
  if (AUTO_DISCOVERY.running) return;
  if (now - AUTO_DISCOVERY.lastStartMs < AUTO_DISCOVERY.cooldownMs) return;
  if (!missingNames || !missingNames.length) return;

  AUTO_DISCOVERY.running = true;
  AUTO_DISCOVERY.lastStartMs = now;
  const wanted = new Set(missingNames.filter(shouldAutoDiscover));

  try {
    if (!wanted.size) return;
    const prefixes = discoverPrefixes();
    const candidates = discoveryCandidates(prefixes);

    await runConcurrent(candidates, AUTO_DISCOVERY.maxConcurrent, async base => {
      if (!wanted.size) return;
      try {
        const r = await fetch(base + '/tlm', {
          cache: 'no-store',
          signal: AbortSignal.timeout(AUTO_DISCOVERY.timeoutMs),
        });
        if (!r.ok) return;
        const data = await r.json();
        const mod = moduleFromTlm(data);
        if (!mod || !wanted.has(mod)) return;
        setAutoHost(mod, hostFromUrl(base) || base);
        wanted.delete(mod);
      } catch (_e) { }
    });
  } finally {
    AUTO_DISCOVERY.running = false;
  }
}

function normalizeHost(raw) {
  let h = (raw || '').trim();
  if (!h) return null;
  if (!h.startsWith('http')) h = 'http://' + h;
  if (h.endsWith('/')) h = h.slice(0, -1);
  return h;
}

function urls(name, path) {
  // Allow fallbacks in host fields: "cap.local,192.168.1.42"
  const raw = getHost(name).trim();
  const hosts = raw ? raw.split(/[\s,;]+/).filter(Boolean) : [];
  const auto = getAutoHost(name);
  if (auto) hosts.push(auto);
  const out = [];
  const seen = new Set();
  for (const host of hosts) {
    const n = normalizeHost(host);
    if (!n) continue;
    const u = n + path;
    if (seen.has(u)) continue;
    seen.add(u);
    out.push(u);
  }
  return out;
}

async function poll(name) {
  const list = urls(name, '/tlm');
  if (!list.length) return null;
  for (const u of list) {
    try {
      const r = await fetch(u, { cache: 'no-store', signal: AbortSignal.timeout(1500) });
      if (!r.ok) continue;
      const data = await r.json();
      const mod = moduleFromTlm(data);
      if (mod && mod !== name) {
        setAutoHost(mod, hostFromUrl(u) || '');
        continue;
      }
      setAutoHost(name, hostFromUrl(u) || '');
      return data;
    } catch (e) { }
  }
  return null;
}

async function send(name, payload) {
  const list = urls(name, '/cmd');
  if (!list.length) { flashBorder(name, false); return false; }
  for (const u of list) {
    try {
      const r = await fetch(u, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(1500),
      });
      if (r.ok) {
        flashBorder(name, true);
        return true;
      }
    } catch (e) { }
  }
  flashBorder(name, false);
  return false;
}

function flashBorder(name, ok) {
  const el = document.getElementById('mod-' + name);
  if (!el) return;
  el.style.transition = 'none';
  el.style.borderColor = ok ? 'var(--ok)' : 'var(--err)';
  setTimeout(() => { el.style.transition = 'border-color 0.6s'; el.style.borderColor = ''; }, 60);
}

// ---------- Stat card helpers ----------

function fmt(v, digits=2) {
  if (v === undefined || v === null || isNaN(v)) return '—';
  return (typeof v === 'number') ? v.toFixed(digits) : String(v);
}

function statCard(label, value, unit, tag, digits=2, sub) {
  const isNum = (typeof value === 'number');
  const isStr = (typeof value === 'string');
  const v = isNum ? value.toFixed(digits) : (isStr ? value : '—');
  const dimCls = (!isNum && !isStr) ? ' dim' : '';
  const tagAttr = tag ? ` data-tag="${tag}"` : '';
  const unitHtml = unit ? `<span class="stat-unit">${unit}</span>` : '';
  const subHtml = sub ? `<div class="stat-sub">${sub}</div>` : '';
  return `<div class="stat"${tagAttr}>
            <div class="stat-label">${label}</div>
            <div class="stat-value${dimCls}">${v}${unitHtml}</div>
            ${subHtml}
          </div>`;
}

function statsPV(d) {
  // Web-MPPT extras: irradiance comes in as 0.0–1.0; show as %.
  const mode = d.mppt_mode || '—';
  const modeUpper = (typeof mode === 'string') ? mode.toUpperCase() : '—';
  const irrPct = (typeof d.irradiance === 'number') ? (d.irradiance * 100) : null;
  const tickSub = (d.web_tick !== undefined && d.web_tick !== null)
    ? `server tick ${d.web_tick}` : 'no fetch yet';
  // Vmpp target — annotate as auto when the firmware is in web mode
  const vmppSub = (mode === 'web') ? 'auto (web)' : 'manual';

  return [
    statCard('PV voltage Vb',  d.v_panel,     'V', 'pv',     2),
    statCard('Bus voltage Va', d.vb_bus,      'V', 'bus',    2),
    statCard('Inductor iL',    d.iL,          'A', 'bus',    3),
    statCard('PV power',       d.p_panel,     'W', 'pwr-in', 2),
    statCard('i_ref',          d.i_ref,       'A', null,     3),
    statCard('Vmpp target',    d.vmpp_target, 'V', null,     2, vmppSub),
    statCard('MPPT mode',      modeUpper,     null,'sun',    0),
    statCard('Irradiance',     irrPct,        '%', 'sun',    0, tickSub),
  ].join('');
}

function statsGrid(d) {
  return [
    statCard('Grid PSU Va',    d.v_psu,       'V', 'bus', 2),
    statCard('Bus voltage Vb', d.vb_bus,      'V', 'bus', 2),
    statCard('Inductor iL',    d.iL,          'A', 'bus', 3),
    statCard('Import power',   d.p_import,    'W', 'pwr-in', 2),
    statCard('i_ref',          d.i_ref,       'A', null, 3),
    statCard('Bus target',     d.vb_target,   'V', null, 2),
  ].join('');
}

function statsExport(d) {
  return [
    statCard('Bus voltage Va',   d.vb_bus,     'V', 'bus', 2),
    statCard('Load voltage Vb',  d.v_resistor, 'V', 'pv', 2),
    statCard('Load current iL',  d.iL,         'A', 'bus', 3),
    statCard('Dissipated power', d.p_dissip,   'W', 'pwr-out', 2),
    statCard('i_ref',            d.i_ref,      'A', null, 3),
    statCard('Bus target',       d.vb_target,  'V', null, 2),
  ].join('');
}

function statsLux(d) {
  const calibrated = (d.calibrated === true);
  const irrPct = (typeof d.irradiance === 'number') ? d.irradiance * 100 : null;

  // Full-width yellow banner that takes the place of stats when uncalibrated.
  const calBanner = (!calibrated)
    ? `<div class="stat" style="grid-column:1/-1; border-top-color:var(--warn); background:rgba(217,168,90,0.10)">
         <div class="stat-label" style="color:var(--warn)">UNCALIBRATED</div>
         <div class="stat-value" style="font-size:13px; color:var(--warn); white-space:normal; line-height:1.4">
           Turn lamp <b>OFF</b> &rarr; click <b>Set 0%</b>.<br>
           Then turn lamp <b>FULL</b> &rarr; click <b>Set 100%</b>.
         </div>
       </div>`
    : '';

  // Show the live raw voltage even when uncalibrated so the user can confirm
  // wiring + light direction before pressing Set 0%.
  return calBanner + [
    statCard('LDR voltage',  d.v_ldr,  'V', 'sun', 3),
    statCard('Irradiance',   irrPct,   '%', 'sun', 1),
    statCard('V_dark (cal)', d.v_dark, 'V', null,  3),
    statCard('V_full (cal)', d.v_full, 'V', null,  3),
  ].join('');
}

function statsCap(d) {
  // Direction badge — what the cap is actually doing right now.
  const iL = (typeof d.iL === 'number') ? d.iL : null;
  let dir = '—';
  if (iL !== null) {
    if      (iL >  0.02) dir = 'CHARGING';
    else if (iL < -0.02) dir = 'DISCHARGING';
    else                 dir = 'IDLE';
  }

  // Note when the soft taper is limiting the request.
  const cmd = (typeof d.i_cmd === 'number') ? d.i_cmd : null;
  const eff = (typeof d.i_cmd_eff === 'number') ? d.i_cmd_eff : null;
  let cmdSub = null;
  if (cmd !== null && eff !== null && Math.abs(cmd - eff) > 0.005) {
    cmdSub = `limited → ${eff.toFixed(3)} A`;
  }

  const soc = (typeof d.soc_pct === 'number') ? Math.max(0, Math.min(100, d.soc_pct)) : 0;
  const socCard = `
    <div class="stat" data-tag="cap">
      <div class="stat-label">State of charge</div>
      <div class="stat-value">${fmt(d.soc_pct, 0)}<span class="stat-unit">%</span></div>
      <div class="soc-track"><div class="soc-fill" style="width:${soc}%"></div></div>
    </div>`;

  return [
    statCard('Cap voltage Va',  d.v_cap,    'V', 'cap', 2),
    statCard('Bus voltage Vb',  d.vb_bus,   'V', 'bus', 2),
    statCard('Inductor iL',     d.iL,       'A', 'cap', 3),
    statCard('Cap power',       d.p_cap,    'W', 'pwr-in', 2,
             (typeof d.p_cap === 'number' && d.p_cap < 0) ? 'discharging' : 'charging'),
    statCard('i_cmd',           d.i_cmd,    'A', null, 3, cmdSub),
    statCard('Direction',       dir,        null,'cap', 0),
    socCard,
    statCard('Energy stored',   d.energy_J, 'J', null, 1),
  ].join('');
}

function ledRow(color, d) {
  const i = d['i_' + color], v = d['v_' + color], p = d['p_' + color];
  return `<div class="led-row">
    <div class="led-color ${color}">${color.toUpperCase()}</div>
    <div class="led-metric"><span class="led-metric-label">I</span>
      <span class="led-metric-value">${fmt(i, 2)}</span>
      <span class="led-metric-unit">A</span></div>
    <div class="led-metric"><span class="led-metric-label">V</span>
      <span class="led-metric-value">${fmt(v, 2)}</span>
      <span class="led-metric-unit">V</span></div>
    <div class="led-metric"><span class="led-metric-label">P</span>
      <span class="led-metric-value">${fmt(p, 2)}</span>
      <span class="led-metric-unit">W</span></div>
  </div>`;
}

function statsLED(d) {
  const total = (d.p_red || 0) + (d.p_yel || 0) + (d.p_grn || 0);
  return `
    <div class="stats">
      ${statCard('Bus voltage (VIN)', lastBusVoltage, 'V', 'bus', 2)}
      ${statCard('Total load',         total,         'W', 'pwr-in', 2)}
    </div>
    ${ledRow('red', d)}
    ${ledRow('yel', d)}
    ${ledRow('grn', d)}`;
}

// ---------- Module rendering ----------

function setStatus(name, data) {
  const el = document.getElementById('mod-' + name);
  const st = el.querySelector('.status');
  if (!data) {
    el.classList.add('offline');
    el.classList.remove('tripped');
    st.textContent = 'offline'; st.className = 'pill err status'; return;
  }
  el.classList.remove('offline');
  el.classList.toggle('tripped', !!data.trip);
  // Lux is a sensor module — no trip/enable/wd. Status reflects calibration state.
  if (name === 'lux') {
    if (data.calibrated) { st.textContent = 'CALIBRATED'; st.className = 'pill ok status'; }
    else                 { st.textContent = 'UNCAL';      st.className = 'pill warn status'; }
    return;
  }
  if (data.trip)         { st.textContent = 'TRIP';     st.className = 'pill err status'; }
  else if (data.wd)      { st.textContent = 'WATCHDOG'; st.className = 'pill warn status'; }
  else if (!data.enable) { st.textContent = 'disabled'; st.className = 'pill warn status'; }
  else                   { st.textContent = 'ok';       st.className = 'pill ok status'; }
}

// Extra header pill for PV: shows MPPT mode (FIXED / WEB) at a glance
function setPVModePill(data) {
  const el = document.getElementById('mod-pv-mode-pill');
  if (!el) return;
  const mode = data && data.mppt_mode;
  if (!mode) { el.textContent = ''; el.className = 'pill'; el.style.display = 'none'; return; }
  el.style.display = '';
  el.textContent = mode.toUpperCase();
  el.className = (mode === 'web') ? 'pill sun' : 'pill';
}

// Highlight the active MPPT-mode button in the controls
function setPVModeButtons(data) {
  const mode = (data && data.mppt_mode) || null;
  const fb = document.getElementById('pv-mode-fixed');
  const wb = document.getElementById('pv-mode-web');
  if (!fb || !wb) return;
  fb.classList.toggle('active', mode === 'fixed');
  wb.classList.toggle('active', mode === 'web');
}

function renderModule(name, data) {
  renderModuleHost(name);
  setStatus(name, data);
  const d = data || {};

  const wifiTxt = d.wifi_connected ? 'connected' : 'disconnected';
  const postTxt = d.backend_post_ok ? 'ok' : 'fail';
  const netModeTxt = d.net_mode || 'offline';

  const banner = document.getElementById('mod-' + name + '-trip');
  if (banner) {
    if (d.trip) {
      banner.classList.add('show');
      const reason = d.trip_reason || 'unknown';
      banner.innerHTML = '⚠ <b>TRIP</b> &nbsp;·&nbsp; reason: <b>' + reason +
                         '</b> &nbsp;·&nbsp; auto-recovers once fault clears';
    } else {
      banner.classList.remove('show');
      banner.innerHTML = '';
    }
  }

  const body = document.getElementById('mod-' + name + '-body');
  let html;
  switch (name) {
    case 'pv':     html = `<div class="stats">${statsPV(d)}</div>`; break;
    case 'grid':   html = `<div class="stats">${statsGrid(d)}</div>`; break;
    case 'export': html = `<div class="stats">${statsExport(d)}</div>`; break;
    case 'cap':    html = `<div class="stats">${statsCap(d)}</div>`; break;
    case 'lux':    html = `<div class="stats">${statsLux(d)}</div>`; break;
    case 'led':    html = statsLED(d); break;
  }
  html += `<div class="stat-sub" style="margin-top:8px">net ${netModeTxt} · wifi ${wifiTxt} · backend ${postTxt}</div>`;
  body.innerHTML = html;

  // PV-specific overlays for the cw variant
  if (name === 'pv') {
    setPVModePill(d);
    setPVModeButtons(d);
  }
}

// ---------- Bus gauge ----------

function renderGauge(data) {
  let vb = null;
  if (data.grid   && data.grid.vb_bus   !== undefined) vb = data.grid.vb_bus;
  else if (data.export && data.export.vb_bus !== undefined) vb = data.export.vb_bus;
  else if (data.pv && data.pv.vb_bus !== undefined)         vb = data.pv.vb_bus;
  lastBusVoltage = vb;

  const lbl = document.getElementById('bus-v');
  const st  = document.getElementById('bus-state');
  if (vb === null) { lbl.textContent = '--.--'; st.textContent = 'no telemetry'; return; }
  lbl.textContent = vb.toFixed(2);
  if (vb < 9.5)       st.textContent = '← grid importing';
  else if (vb > 10.5) st.textContent = 'export dissipating →';
  else                st.textContent = 'idle deadband';

  const pct = v => ((v - GAUGE_LO) / (GAUGE_HI - GAUGE_LO)) * 100;
  document.getElementById('gauge-marker').style.left  = pct(vb) + '%';
  const db = document.getElementById('gauge-deadband');
  db.style.left  = pct(9.5) + '%';
  db.style.width = (pct(10.5) - pct(9.5)) + '%';
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = TRACES.map(tr =>
    `<span class="leg on" data-k="${tr.key}">
       <span class="sw" style="background:${tr.color}"></span>${tr.label}

      const k = span.dataset.k;
      TRACE_VISIBLE[k] = !TRACE_VISIBLE[k];
      span.classList.toggle('on', TRACE_VISIBLE[k]);
    };
  });
}

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (canvas.width !== rect.width * dpr) {
    canvas.width  = rect.width * dpr;
    canvas.height = rect.height * dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, w: rect.width, h: rect.height };
}

function drawChart() {
  const canvas = document.getElementById('chart');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const padL = 36, padR = 36, padT = 6, padB = 18;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;
  if (plotW <= 0 || plotH <= 0) return;

  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(padL, padT, plotW, plotH);

  const yV = v => padT + (1 - (v - CHART_V_LO) / (CHART_V_HI - CHART_V_LO)) * plotH;
  const yA = a => padT + (1 - (a - CHART_I_LO) / (CHART_I_HI - CHART_I_LO)) * plotH;
  const n  = HISTORY.t.length;
  const xAt = i => padL + (n <= 1 ? plotW : (i / (HIST_MAX - 1)) * plotW);

  ctx.strokeStyle = '#1f1f1f'; ctx.lineWidth = 1;
  ctx.fillStyle = '#666'; ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let v = CHART_V_LO; v <= CHART_V_HI; v += 1) {
    const y = yV(v);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
    ctx.fillText(v.toFixed(0), padL - 4, y);
  }

  ctx.textAlign = 'left';
  for (let a = CHART_I_LO; a <= CHART_I_HI; a += 1) {
    const y = yA(a);
    ctx.fillStyle = '#555';
    ctx.fillText(a.toFixed(0), padL + plotW + 4, y);
  }

  ctx.strokeStyle = 'rgba(90,142,201,0.4)';
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(padL, yV(9.5));  ctx.lineTo(padL + plotW, yV(9.5));
  ctx.moveTo(padL, yV(10.5)); ctx.lineTo(padL + plotW, yV(10.5));
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = '#222';
  ctx.beginPath(); ctx.moveTo(padL, yA(0)); ctx.lineTo(padL + plotW, yA(0)); ctx.stroke();

  TRACES.forEach(tr => {
    if (!TRACE_VISIBLE[tr.key]) return;
    const data = HISTORY[tr.key];
    const yFn = (tr.axis === 'V') ? yV : yA;
    ctx.strokeStyle = tr.color;
    ctx.lineWidth = (tr.axis === 'V') ? 2 : 1.4;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < data.length; i++) {
      const v = data[i];
      if (v === null || v === undefined || isNaN(v)) { started = false; continue; }
      const x = xAt(i);
      const y = yFn(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else          { ctx.lineTo(x, y); }
    }
    ctx.stroke();
  });

  ctx.strokeStyle = '#2c2c2c';
  ctx.strokeRect(padL, padT, plotW, plotH);

  if (n > 0) {
    const last = TRACES.map(tr => {
      const v = HISTORY[tr.key][n - 1];
      return (v === null || v === undefined || isNaN(v))
        ? `${tr.label} —`
        : `${tr.label} ${v.toFixed(2)}`;
    }).join('  ·  ');
    document.getElementById('chart-now').textContent = last;
  }
}

// ---------- Per-module mini chart ----------

function drawModuleChart(name) {
  const canvas = document.getElementById('mod-' + name + '-chart');
  if (!canvas) return;
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const traces  = PER_MODULE_TRACES[name];
  const history = MOD_HISTORY[name];
  const padL = 30, padR = 30, padT = 6, padB = 12;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;
  if (plotW <= 0 || plotH <= 0) return;

  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(padL, padT, plotW, plotH);

  const ledOnly = traces.every(tr => tr.axis === 'AL');
  // Cap voltage spans 10–18 V; LDR is 0–3.3 V. Both need their own axis.
  const isCap = (name === 'cap');
  const isLux = (name === 'lux');
  const vLo = 0,                            vHi = isCap ? 18  : isLux ? 3.3 : 12;
  const aLo = isCap ? -0.4 : isLux ? 0 : -2, aHi = isCap ? 0.4 : isLux ? 1 : 3;
  const alLo = 0, alHi = 1.2;

  const yV  = v => padT + (1 - (v - vLo)  / (vHi  - vLo))  * plotH;
  const yA  = v => padT + (1 - (v - aLo)  / (aHi  - aLo))  * plotH;
  const yAL = v => padT + (1 - (v - alLo) / (alHi - alLo)) * plotH;
  const yFor = axis => axis === 'V' ? yV : axis === 'AL' ? yAL : yA;
  const xAt = i => padL + (HIST_MAX <= 1 ? 0 : (i / (HIST_MAX - 1)) * plotW);

  ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 1;
  ctx.font = '9px ui-monospace, monospace'; ctx.textBaseline = 'middle';

  if (ledOnly) {
    ctx.fillStyle = '#666'; ctx.textAlign = 'right';
    for (let a = 0; a <= 1.2; a += 0.3) {
      const y = yAL(a);
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
      ctx.fillText(a.toFixed(1), padL - 3, y);
    }
  } else {
    const vStep = isCap ? 3 : isLux ? 1   : 2;
    const aStep = isCap ? 0.2 : isLux ? 0.5 : 1;
    const aDigits = isCap ? 1 : isLux ? 1 : 0;
    ctx.fillStyle = '#666'; ctx.textAlign = 'right';
    for (let v = vLo; v <= vHi + 1e-6; v += vStep) {
      const y = yV(v);
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
      ctx.fillText(v.toFixed(0), padL - 3, y);
    }
    ctx.fillStyle = '#555'; ctx.textAlign = 'left';
    for (let a = aLo; a <= aHi + 1e-6; a += aStep) {
      ctx.fillText(a.toFixed(aDigits), padL + plotW + 3, yA(a));
    }
    if (isCap) {
      // For the cap chart: mark V_CAP_MIN / V_CAP_MAX limits instead.
      ctx.strokeStyle = 'rgba(94,201,192,0.35)'; ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(padL, yV(10.5)); ctx.lineTo(padL + plotW, yV(10.5));
      ctx.moveTo(padL, yV(17.5)); ctx.lineTo(padL + plotW, yV(17.5));
      ctx.stroke();
      ctx.setLineDash([]);
    } else if (isLux) {
      // No marker lines — calibration thresholds are arbitrary per setup.
    } else {
      // Bus deadband marks only meaningful when V axis is the bus range.
      ctx.strokeStyle = 'rgba(90,142,201,0.35)'; ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(padL, yV(9.5));  ctx.lineTo(padL + plotW, yV(9.5));
      ctx.moveTo(padL, yV(10.5)); ctx.lineTo(padL + plotW, yV(10.5));
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.strokeStyle = '#222';
    ctx.beginPath(); ctx.moveTo(padL, yA(0)); ctx.lineTo(padL + plotW, yA(0)); ctx.stroke();
  }

  traces.forEach(tr => {
    const yFn = yFor(tr.axis);
    ctx.strokeStyle = tr.color;
    ctx.lineWidth = 1.5;
    // Vmpp target trace gets a dashed line so it visually contrasts with v_panel
    if (tr.key === 'vmpp_target') {
      ctx.setLineDash([4, 3]);
      ctx.lineWidth = 1.2;
    }
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < history.length; i++) {
      const v = history[i][tr.key];
      if (v === undefined || v === null || isNaN(v)) { started = false; continue; }
      const x = xAt(i);
      const y = yFn(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else          { ctx.lineTo(x, y); }
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  ctx.strokeStyle = '#2c2c2c';
  ctx.strokeRect(padL, padT, plotW, plotH);

  const foot = document.getElementById('mod-' + name + '-foot');
  const last = history.length ? history[history.length - 1] : {};
  foot.innerHTML = traces.map(tr => {
    const v = last[tr.key];
    const val = (v === undefined || v === null || isNaN(v)) ? '—'
              : v.toFixed(tr.axis === 'V' ? 2 : 3) + (tr.axis === 'V' ? ' V' : ' A');
    return `<span class="leg on">
              <span class="sw" style="background:${tr.color};width:10px;height:2px;display:inline-block"></span>
              ${tr.label} ${val}
            </span>`;
  }).join('');
}

// ---------- Poll loop ----------

async function tick() {
  const results = {};
  await Promise.all(MODULES.map(async n => { results[n] = await poll(n); }));
  const missing = MODULES.filter(n => !results[n]);
  if (missing.length) autoDiscoverMissing(missing);
  renderGauge(results);
  MODULES.forEach(n => renderModule(n, results[n]));
  recordSample(results);
  drawChart();
  MODULES.forEach(n => drawModuleChart(n));
}

window.addEventListener('resize', () => {
  drawChart();
  MODULES.forEach(n => drawModuleChart(n));
});

async function heartbeat() {
  await Promise.all(MODULES.map(async name => {
    const list = urls(name, '/cmd');
    for (const u of list) {
      try {
        const r = await fetch(u, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
          signal: AbortSignal.timeout(1500),
        });
        if (r.ok) break;
      } catch (e) { }
    }
  }));
}

build();
loadHosts();
buildLegend();
heartbeat();
tick();
setInterval(tick, 1000);
setInterval(heartbeat, 5000);
</script>
